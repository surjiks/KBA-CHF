<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoLedger Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/styles/style.css">
    <script src="/public/scripts/index.js" defer></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>AutoLedger Dashboard</h1>
            <div class="org-switcher">
                <label for="orgSelect">Active Org:</label>
                <select id="orgSelect">
                    <option value="org1">Organization 1</option>
                    <option value="org2">Organization 2</option>
                    <option value="org3">Organization 3</option>
                </select>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Create Car Card -->
            <div class="card">
                <div class="status-badge">● System Online</div>
                <h2>Register Vehicle</h2>
                <form id="addForm">
                    <div class="form-group">
                        <label>Car ID</label>
                        <input id="carId" type="text" placeholder="e.g. CAR101" required />
                    </div>
                    <div class="form-group">
                        <label>Make</label>
                        <input id="make" type="text" placeholder="e.g. Tesla" required />
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input id="model" type="text" placeholder="e.g. Model S" required />
                    </div>
                    <div class="form-group">
                        <label>Color</label>
                        <input id="color" type="text" placeholder="e.g. Blue" required />
                    </div>
                    <div class="form-group">
                        <label>Date of Manufacture</label>
                        <input id="dateOfManufacture" type="date" required />
                    </div>
                    <div class="form-group">
                        <label>Manufacturer Name</label>
                        <input id="manufacturerName" type="text" placeholder="e.g. Tesla Inc." required />
                    </div>
                    <button type="submit" class="primary" onclick="addData(event)">Create Car</button>
                    <button type="reset" class="ghost">Clear Form</button>
                </form>
            </div>

            <!-- Query Car Card -->
            <div class="card">
                <div class="status-badge">● Ledger Explorer</div>
                <h2>Query Asset</h2>
                <form id="readForm">
                    <div class="form-group">
                        <label>Enter Car ID</label>
                        <input id="carIdInput" type="text" placeholder="Search by ID..." />
                    </div>
                    <button type="submit" class="secondary" onclick="readData(event)">Search Ledger</button>
                    <button type="button" class="ghost" onclick="getAllData(event)">List All Assets</button>
                    <button type="reset" class="ghost">Reset</button>
                </form>

                <div class="results-section">
                    <h2>Live Results</h2>
                    <div id="resultsDisplay" class="results-display">
                        // Results will appear here...
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
